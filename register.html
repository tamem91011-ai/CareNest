<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - CareNest</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div class="auth-card">
        <!-- Header -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.75rem; font-weight: 800; color: var(--text-dark);">Create Account</h1>
            <p style="font-size: 0.9rem; color: var(--text-light); margin-top: 0.5rem;">Start documenting care with
                confidence</p>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label class="input-label">Full Name</label>
                <input type="text" class="input-field" placeholder="Sarah Smith">
            </div>

            <div class="input-group">
                <label class="input-label">Email</label>
                <input type="email" class="input-field" placeholder="caregiver@example.com">
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" class="input-field" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>

        <p style="text-align: center; font-size: 0.85rem; color: var(--text-light); margin-top: 1.5rem;">
            Already have an account?
            <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
