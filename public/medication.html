<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication Management - CareNest</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #F8F5F2;
        }

        .workspace-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 24px;
        }

        .medication-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--glass-border);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stock-indicator {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            width: 100%;
            margin-top: 8px;
            overflow: hidden;
        }

        .stock-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-low {
            background: #FFE5E5;
            color: #D63031;
        }

        .badge-ok {
            background: #E5F9E5;
            color: var(--primary);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">
                <div class="logo-circle"></div>
                <div class="logo-text">CareNest</div>
            </a>
            <div class="nav-links" style="display: flex; gap: 12px;">
                <a href="guide.html" class="btn btn-outline"
                    style="padding: 8px 16px; font-size: 0.8rem; border-color: var(--primary); color: var(--primary);">
                    <i data-lucide="book-open" style="width: 14px; vertical-align: middle; margin-right: 4px;"></i>
                    Academy</a>
                <a href="dashboard.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.8rem;">&larr;
                    Back to Workspace</a>
            </div>
        </div>
    </nav>

    <main class="workspace-container">

        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
            <div>
                <h1 style="font-size: 1.75rem; font-weight: 800; color: var(--text-dark);">Medication Inventory</h1>
                <p style="color: var(--text-light); margin-top: 4px;">Track stock levels and dosage requirements for
                    **Resident A**</p>
            </div>
            <button class="btn btn-primary">+ Add New Medication</button>
        </div>

        <!-- Medication Skeleton -->
        <div
            style="border: 2px dashed rgba(0,0,0,0.1); border-radius: 20px; height: 500px; background: white; margin-top: 24px;">
        </div>

    </main>

    <script>lucide.createIcons();</script>
</body>

</html>
