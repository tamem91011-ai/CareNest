<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareNest - Reliable Care Documentation</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <div class="logo-circle"></div>
                <div class="logo-text">CareNest</div>
            </a>
            <div class="nav-links">
                <a href="login.html" class="btn btn-outline" style="margin-right: 10px;">Log in</a>
                <a href="register.html" class="btn btn-primary">Get Started</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" style="padding: 8rem 0; text-align: center;">
        <div class="container">
            <div style="background: #e8f5e9; display: inline-block; padding: 0.5rem 1rem; border-radius: 50px; color: var(--primary); font-weight: 600; font-size: 0.8rem; margin-bottom: 1.5rem;">
                ✨ Care, clearly organised.
            </div>
            <h1 style="font-size: 3.5rem; line-height: 1.1; margin-bottom: 1.5rem; color: var(--text-dark);">
                Calm, reliable care <br> 
                <span style="color: var(--primary);">documentation for caregivers.</span>
            </h1>
            <p style="font-size: 1.25rem; color: var(--text-light); max-width: 600px; margin: 0 auto 2.5rem;">
                Track medications, routines, and symptoms without the stress. 
                Built for privacy, designed for peace of mind.
            </p>
            <div class="hero-btns">
                <a href="register.html" class="btn btn-primary" style="padding: 1rem 2rem; font-size: 1.1rem;">Start documenting free</a>
            </div>
        </div>
    </section>

    <!-- Icons Init -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
