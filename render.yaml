services:
  - type: web
    name: carenest-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: SUPABASE_URL
        fromEnvVar: SUPABASE_URL
      - key: SUPABASE_KEY
        fromEnvVar: SUPABASE_KEY
      - key: GEMINI_API_KEY
        fromEnvVar: GEMINI_API_KEY
