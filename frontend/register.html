<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - CareNest</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

    <nav class="navbar" style="top: 20px;">
        <div class="nav-content">
            <a href="index.html" class="logo">
                <div class="logo-circle"></div>
                <div class="logo-text">CareNest</div>
            </a>
            <div class="nav-links">
                <a href="login.html" class="btn btn-outline" style="padding: 8px 20px;">Log in</a>
            </div>
        </div>
    </nav>

    <div class="auth-card" style="margin-top: 80px;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <h1 style="font-size: 1.75rem; font-weight: 800; color: var(--text-dark);">Create Account</h1>
            <p style="color: var(--text-light); margin-top: 0.5rem; font-size: 0.9rem;">Join a community of modern
                caregivers</p>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label class="input-label">Full Name</label>
                <input type="text" id="fullName" class="input-field" placeholder="Sarah Smith" required>
            </div>

            <div class="input-group">
                <label class="input-label">Care Role</label>
                <select id="careRole" class="input-field" style="appearance: none; cursor: pointer;">
                    <option value="Primary Caregiver">Primary Caregiver</option>
                    <option value="Family Member">Family Member</option>
                    <option value="Healthcare Professional">Healthcare Professional</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" id="email" class="input-field" placeholder="sarah@example.com" required>
            </div>

            <div class="input-group">
                <label class="input-label">Create Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Start
                Documentation</button>
        </form>

        <script>
            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const fullName = document.getElementById('fullName').value;
                const role = document.getElementById('careRole').value;

                await signUpUser(email, password, fullName, role);
            });
        </script>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-light);">
            Already registered? <a href="login.html"
                style="color: var(--primary); font-weight: 700; text-decoration: none;">Sign in here</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
